<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Workload Prioritizer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700;800&family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css" />
<style>
  html[lang="th"] body { font-family: 'IBM Plex Sans Thai', 'Quicksand', sans-serif; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="chart.jsx"></script>
<script type="text/babel" src="addtask.jsx"></script>
<script type="text/babel" src="tasklist.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>

<script type="text/babel">
const { useState, useMemo, useEffect, useRef } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "language": "en",
  "chartType": "stacked",
  "capacity": 7,
  "density": "comfortable",
  "dark": false
}/*EDITMODE-END*/;

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const t = STRINGS[tweaks.language] || STRINGS.en;
  const [weekOffset, setWeekOffset] = useState(0);
  const [tasks, setTasks] = useState(makeInitialTasks);
  const [subjects, setSubjects] = useState(SUBJECTS);
  const [showAdd, setShowAdd] = useState(false);
  const [showOnb, setShowOnb] = useState(true);
  const [onbCap, setOnbCap] = useState(tweaks.capacity);
  const [selectedTaskId, setSelectedTaskId] = useState(null);

  const dates = useMemo(() => weekDates(weekOffset), [weekOffset]);
  const todayDate = useMemo(() => new Date(2026, 3, 27), []); // Mon Apr 27, 2026
  const dayLabels = t.dayLabels;

  // Update <html lang> for font switching
  useEffect(() => {
    document.documentElement.lang = tweaks.language;
  }, [tweaks.language]);

  // Filter tasks for current week
  const weekTasks = useMemo(() => {
    const weekStart = dates[0].setHours(0, 0, 0, 0);
    const weekEnd = dates[6].setHours(23, 59, 59, 999);
    
    return tasks.map((task) => {
      // Filter slots that fall within current week
      const weekSlots = task.slots.filter((slot) => {
        const slotDate = new Date(dates[0]);
        slotDate.setDate(dates[0].getDate() + slot.day);
        const slotTime = slotDate.setHours(0, 0, 0, 0);
        return slotTime >= weekStart && slotTime <= weekEnd;
      });
      
      // Only return task if it has slots in this week
      if (weekSlots.length === 0) return null;
      
      return { ...task, slots: weekSlots };
    }).filter(Boolean);
  }, [tasks, dates]);

  // Day totals + overload calc
  const dayTotals = useMemo(() => {
    const out = Array(7).fill(0);
    weekTasks.forEach((task) => task.slots.forEach((s) => { out[s.day] += s.hours; }));
    return out;
  }, [weekTasks]);

  const total = dayTotals.reduce((a, b) => a + b, 0);
  const overDays = dayTotals.map((v, i) => v > tweaks.capacity ? i : -1).filter((i) => i >= 0);
  const heaviestDay = dayTotals.indexOf(Math.max(...dayTotals));
  const heaviestHours = dayTotals[heaviestDay];

  const fmtRange = (dates) => {
    const a = dates[0], b = dates[6];
    const m = (d) => d.toLocaleDateString(tweaks.language === 'th' ? 'th-TH' : 'en-US', { month: 'short' });
    if (a.getMonth() === b.getMonth()) {
      return `${m(a)} ${a.getDate()}–${b.getDate()}, ${a.getFullYear()}`;
    }
    return `${m(a)} ${a.getDate()} – ${m(b)} ${b.getDate()}`;
  };

  const handleAddTask = ({ title, subjectId, deadline, customDeadline, difficulty, importance, comfortable, hours }) => {
    // distribute across N days, prefer days BEFORE deadline, skip already-heavy days
    const splitDays = daysToSplit(hours);
    const slotHours = splitHours(hours, splitDays);

    // candidate days: 0..deadline (inclusive), sorted by current load asc
    const localDayTotals = [...dayTotals];
    const candidates = [];
    for (let d = 0; d <= deadline; d++) candidates.push(d);
    candidates.sort((a, b) => localDayTotals[a] - localDayTotals[b]);

    const chosenDays = candidates.slice(0, splitDays).sort((a, b) => a - b);
    // if not enough days before deadline, fill from after
    while (chosenDays.length < splitDays) {
      for (let d = 6; d > deadline && chosenDays.length < splitDays; d--) {
        if (!chosenDays.includes(d)) chosenDays.push(d);
      }
      break;
    }

    const slots = slotHours.map((h, i) => ({ day: chosenDays[i] ?? deadline, hours: h }));

    const task = {
      id: 't' + Date.now(),
      title, subjectId, deadline, customDeadline, difficulty, importance, comfortable, hours,
      slots,
    };
    setTasks((prev) => [...prev, task]);
    setShowAdd(false);
  };

  const handleAddSubject = (newSubject) => {
    setSubjects((prev) => [...prev, newSubject]);
  };

  const handleMoveSlot = (taskId, slotIdx, newDay) => {
    setTasks((prev) => prev.map((task) => {
      if (task.id !== taskId) return task;
      const slots = task.slots.map((s, i) => i === slotIdx ? { ...s, day: newDay } : s);
      return { ...task, slots };
    }));
  };

  const handleDeleteTask = (taskId) => {
    setTasks((prev) => prev.filter((task) => task.id !== taskId));
    if (selectedTaskId === taskId) setSelectedTaskId(null);
  };

  const onbStart = () => {
    setTweak('capacity', onbCap);
    setShowOnb(false);
  };

  return (
    <div className={`app ${tweaks.density === 'compact' ? 'compact' : ''}`}
         data-theme={tweaks.dark ? 'dark' : 'light'}>

      {/* Onboarding */}
      {showOnb && (
        <div className="onb">
          <div className="onb-card">
            <div className="onb-mark"></div>
            <h1>{t.onboardingTitle}</h1>
            <p>{t.onboardingDesc}</p>
            <div className="onb-q">{t.capacityQ}</div>
            <div className="onb-cap">
              <span className="onb-cap-val mono">{onbCap}</span>
              <span className="onb-cap-unit">{t.hoursFull} {t.perDay}</span>
            </div>
            <input type="range" className="onb-slider"
                   min="2" max="12" step="1"
                   value={onbCap}
                   onChange={(e) => setOnbCap(Number(e.target.value))} />
            <button className="onb-start" onClick={onbStart}>{t.start} →</button>
          </div>
        </div>
      )}

      {/* Main column */}
      <div className="main">
        <div className="hdr">
          <div className="hdr-brand">
            <div className="brand-mark"></div>
            <div className="brand-text">
              <span className="brand-name">{t.appName}</span>
              <span className="brand-tag">{t.tagline}</span>
            </div>
          </div>
          <div className="week-nav">
            <button className="week-arrow" onClick={() => setWeekOffset((w) => w - 1)} aria-label="prev week">‹</button>
            <div className="week-label">
              <div className="week-range">{fmtRange(dates)}</div>
              <div className="week-sub mono">{t.week} · {dates[0].getDate()}–{dates[6].getDate()}</div>
            </div>
            <button className="week-arrow" onClick={() => setWeekOffset((w) => w + 1)} aria-label="next week">›</button>
            {weekOffset !== 0 && (
              <button className="week-today" onClick={() => setWeekOffset(0)}>{t.today}</button>
            )}
          </div>
        </div>

        {/* Stats */}
        <div className="stats">
          <StatTile label={t.totalThisWeek} value={total} unit={t.hours} />
          <StatTile label={t.tasksThisWeek} value={weekTasks.length} />
          <StatTile label={t.weekHigh}
                    value={heaviestHours > 0 ? `${dayLabels[heaviestDay]} ${heaviestHours}` : t.none}
                    unit={heaviestHours > 0 ? t.hours : ''}
                    tone={heaviestHours > tweaks.capacity ? 'warn' : ''} />
          <StatTile label={t.overdays}
                    value={overDays.length}
                    tone={overDays.length > 0 ? 'warn' : ''} />
        </div>



        {/* Chart */}
        <div className="chart-section">
          <div className="chart-head">
            <div className="chart-title">
              {t.week} {t.chartType.toLowerCase()}
            </div>
            <div className="chart-right">
              {/* Legend inline */}
              <div className="legend-inline">
                {subjects.filter((s) => weekTasks.some((task) => task.subjectId === s.id)).map((s) => (
                  <div key={s.id} className="legend-item">
                    <span className="legend-dot" style={{ background: s.color }} />
                    <span>{s.name}</span>
                  </div>
                ))}
                {weekTasks.length === 0 && <span className="legend-item" style={{ color: 'var(--ink-3)' }}>—</span>}
              </div>
              <div className="chart-toggle">
                <button className={tweaks.chartType === 'stacked' ? 'on' : ''}
                        onClick={() => setTweak('chartType', 'stacked')}>{t.stacked}</button>
                <button className={tweaks.chartType === 'bar' ? 'on' : ''}
                        onClick={() => setTweak('chartType', 'bar')}>{t.bar}</button>
              </div>
            </div>
          </div>
          <WorkloadChart
            tasks={weekTasks}
            subjects={subjects}
            capacity={tweaks.capacity}
            dayLabels={dayLabels}
            dates={dates}
            todayDate={todayDate}
            chartType={tweaks.chartType}
            density={tweaks.density}
            t={t}
            onMoveSlot={handleMoveSlot}
            onSelectTask={(id) => setSelectedTaskId(id === selectedTaskId ? null : id)}
            selectedTaskId={selectedTaskId}
          />
        </div>

        {/* Legend removed - now inline in chart header */}
      </div>

      {/* Side panel */}
      <div className="side">
        <div className="side-head">
          <div className="side-title">{t.yourTasks}</div>
          <button className="btn-add" onClick={() => setShowAdd(true)}>{t.addTask}</button>
        </div>
        <TaskList
          tasks={weekTasks}
          subjects={subjects}
          dayLabels={dayLabels}
          dates={dates}
          capacity={tweaks.capacity}
          t={t}
          onDeleteTask={handleDeleteTask}
          onSelectTask={(id) => setSelectedTaskId(id === selectedTaskId ? null : id)}
          selectedTaskId={selectedTaskId}
        />
      </div>

      {/* Add Task modal */}
      {showAdd && (
        <div className="modal-bg" onClick={(e) => e.target === e.currentTarget && setShowAdd(false)}>
          <AddTaskForm
            subjects={subjects}
            dayLabels={dayLabels}
            dates={dates}
            capacity={tweaks.capacity}
            onAdd={handleAddTask}
            onAddSubject={handleAddSubject}
            onCancel={() => setShowAdd(false)}
            t={t}
          />
        </div>
      )}

      {/* Tweaks */}
      <TweaksPanel title="Tweaks">
        <TweakSection label="Display" />
        <TweakRadio label="Language" value={tweaks.language}
                    options={[{value:'en',label:'EN'}, {value:'th',label:'TH'}]}
                    onChange={(v) => setTweak('language', v)} />
        <TweakRadio label="Chart" value={tweaks.chartType}
                    options={[
                      {value:'stacked', label:'Stack'},
                      {value:'bar', label:'Bar'},
                      {value:'heatmap', label:'Heat'}
                    ]}
                    onChange={(v) => setTweak('chartType', v)} />
        <TweakRadio label="Density" value={tweaks.density}
                    options={[{value:'compact',label:'Compact'},{value:'comfortable',label:'Comfortable'}]}
                    onChange={(v) => setTweak('density', v)} />
        <TweakToggle label="Dark mode" value={tweaks.dark}
                     onChange={(v) => setTweak('dark', v)} />
        <TweakSection label="Capacity" />
        <TweakSlider label="Hours per day" value={tweaks.capacity}
                     min={2} max={12} step={1} unit="h"
                     onChange={(v) => setTweak('capacity', v)} />
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
